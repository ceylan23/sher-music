<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sher</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000;--bg2:#1c1c1e;--card:#1c1c1e;
  --red:#fa243c;
  --t1:#fff;--t2:#8e8e93;--t3:#636366;
  --sep:rgba(255,255,255,.08);
  --glass:rgba(22,22,23,.85);
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Helvetica Neue',sans-serif;
  --player-h:68px;--nav-h:50px;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--t1);
  -webkit-font-smoothing:antialiased;min-height:100vh;
  padding-bottom:calc(var(--player-h) + var(--nav-h))}

/* ========== TOP NAV ========== */
.topnav{position:sticky;top:0;z-index:100;
  background:var(--glass);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--sep)}
.topnav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;
  padding:0 24px;height:48px;gap:24px}
.topnav-logo{font-size:20px;font-weight:800;color:var(--red);letter-spacing:-.3px;
  font-style:italic;flex-shrink:0}
.topnav-tabs{display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;flex:1}
.topnav-tabs::-webkit-scrollbar{display:none}
.topnav-tab{padding:6px 14px;font-size:14px;font-weight:500;color:var(--t2);
  white-space:nowrap;cursor:pointer;border-radius:8px;transition:.15s}
.topnav-tab:hover{color:var(--t1)}
.topnav-tab.active{color:var(--t1);font-weight:600;background:rgba(255,255,255,.06)}
.topnav-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.topnav-search{position:relative}
.topnav-search input{width:180px;height:32px;padding:0 12px 0 30px;border-radius:8px;
  border:none;background:rgba(255,255,255,.08);color:var(--t1);font-size:13px;
  font-family:var(--font);outline:none;transition:width .25s}
.topnav-search input:focus{width:260px;background:rgba(255,255,255,.12)}
.topnav-search input::placeholder{color:var(--t3)}
.topnav-search svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;color:var(--t3)}
.topnav-avatar{width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,var(--red),#bf5af2);display:none;
  align-items:center;justify-content:center;color:#fff;font-size:11px;
  font-weight:700;cursor:pointer}
.topnav-login{background:none;border:none;cursor:pointer;padding:4px;color:var(--t2);
  transition:color .15s;display:flex}
.topnav-login:hover{color:var(--t1)}
.topnav-login svg{width:20px;height:20px}
@media(max-width:768px){
  .topnav-inner{padding:0 16px;gap:12px}
  .topnav-search input{width:120px}
  .topnav-search input:focus{width:160px}
}

/* ========== CONTENT ========== */
.page{max-width:1200px;margin:0 auto;padding:24px 24px 40px}
@media(max-width:768px){.page{padding:16px 16px 32px}}

/* ========== PAGE TITLE ========== */
.page-title{font-size:36px;font-weight:800;letter-spacing:-.5px;margin-bottom:24px}
@media(max-width:768px){.page-title{font-size:28px;margin-bottom:20px}}

/* ========== SECTION ========== */
.section{margin-bottom:48px}
@media(max-width:768px){.section{margin-bottom:36px}}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:24px;font-weight:700;letter-spacing:-.3px}
@media(max-width:768px){.section-title{font-size:20px}}
.section-link{font-size:14px;color:var(--red);cursor:pointer;font-weight:500;
  background:none;border:none;padding:4px 0}
.section-link:hover{opacity:.8}

/* ========== HORIZONTAL SCROLL ROW ========== */
.hrow{display:flex;gap:20px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scroll-snap-type:x mandatory;scrollbar-width:none;padding-bottom:4px}
.hrow::-webkit-scrollbar{display:none}
@media(max-width:768px){.hrow{gap:14px}}

/* ========== CARD (Apple Music style) ========== */
.card{flex-shrink:0;width:180px;scroll-snap-align:start;cursor:pointer;
  transition:transform .2s}
.card:active{transform:scale(.97)}
@media(max-width:768px){.card{width:150px}}
.card-art{width:100%;aspect-ratio:1;border-radius:8px;overflow:hidden;
  background:var(--bg2);position:relative}
.card-art img{width:100%;height:100%;object-fit:cover;display:block}
.card-art-placeholder{width:100%;height:100%;display:flex;align-items:center;
  justify-content:center;font-size:40px;background:linear-gradient(135deg,#1c1c1e,#2c2c2e)}
.card-name{font-size:14px;font-weight:600;margin-top:8px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.card-sub{font-size:12px;color:var(--t2);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ========== WIDE CARD (playlists) ========== */
.wcard{flex-shrink:0;width:320px;scroll-snap-align:start;cursor:pointer;
  display:flex;gap:12px;align-items:center;padding:10px;border-radius:10px;
  transition:background .15s}
.wcard:active{background:rgba(255,255,255,.04)}
@media(max-width:768px){.wcard{width:280px}}
.wcard-art{width:56px;height:56px;border-radius:8px;overflow:hidden;
  background:var(--bg2);flex-shrink:0}
.wcard-art img{width:100%;height:100%;object-fit:cover}
.wcard-info{min-width:0}
.wcard-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis}
.wcard-sub{font-size:12px;color:var(--t2);margin-top:2px}

/* ========== SONG LIST ========== */
.song-list{display:flex;flex-direction:column}
.song-row{display:flex;align-items:center;padding:8px 0;gap:12px;cursor:pointer;
  border-bottom:1px solid var(--sep);transition:background .1s}
.song-row:last-child{border-bottom:none}
.song-row:active{background:rgba(255,255,255,.04)}
.song-row.playing .song-r-name{color:var(--red)}
.song-r-num{width:24px;text-align:right;font-size:14px;color:var(--t3);
  flex-shrink:0;font-variant-numeric:tabular-nums}
.song-r-art{width:44px;height:44px;border-radius:6px;background:var(--bg2);
  flex-shrink:0;overflow:hidden}
.song-r-art img{width:100%;height:100%;object-fit:cover}
.song-r-info{flex:1;min-width:0}
.song-r-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;line-height:1.3}
.song-r-artist{font-size:13px;color:var(--t2);margin-top:1px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.song-r-dur{font-size:13px;color:var(--t3);flex-shrink:0;font-variant-numeric:tabular-nums}
@media(max-width:768px){.song-r-num{width:20px;font-size:13px}}

/* ========== GRAD CARDS ========== */
.grad-row{display:flex;gap:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;margin-bottom:24px}
.grad-row::-webkit-scrollbar{display:none}
.grad-card{flex-shrink:0;width:200px;height:80px;border-radius:10px;padding:14px;
  color:#fff;cursor:pointer;position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:flex-end;
  transition:transform .2s;scroll-snap-align:start}
.grad-card:active{transform:scale(.96)}
.grad-card .gc-t{font-size:15px;font-weight:700}
.grad-card .gc-s{font-size:11px;opacity:.7;margin-top:2px}
.grad-card::after{content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 20%,rgba(0,0,0,.4) 100%);pointer-events:none}

/* ========== HOT TAGS ========== */
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.tag{padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;
  background:rgba(255,255,255,.06);color:var(--t2);border:1px solid var(--sep);
  transition:.15s}
.tag:hover{color:var(--red);border-color:var(--red);background:rgba(250,36,60,.06)}

/* ========== PLAYER BAR ========== */
.player{position:fixed;bottom:var(--nav-h);left:0;right:0;
  height:var(--player-h);background:var(--glass);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid var(--sep);z-index:200;display:flex;align-items:center;
  padding:0 16px;gap:12px;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.player.show{transform:translateY(0)}
.p-progress{position:absolute;top:-1px;left:0;right:0;height:3px;
  background:rgba(255,255,255,.08);cursor:pointer}
.p-fill{height:100%;background:var(--red);width:0;transition:width .25s}
.p-cover{width:48px;height:48px;border-radius:6px;background:var(--bg2);
  flex-shrink:0;overflow:hidden;cursor:pointer}
.p-cover img{width:100%;height:100%;object-fit:cover}
.p-info{flex:1;min-width:0;cursor:pointer}
.p-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis}
.p-artist{font-size:12px;color:var(--t2);margin-top:1px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.p-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.p-btn{background:none;border:none;cursor:pointer;width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;border-radius:50%;
  color:var(--t2);transition:.15s}
.p-btn:hover{color:var(--t1);background:rgba(255,255,255,.06)}
.p-btn svg{width:18px;height:18px}
.p-play{width:36px;height:36px;background:var(--red);color:#fff;border-radius:50%;
  box-shadow:0 2px 12px rgba(250,36,60,.3)}
.p-play:hover{background:#e0203a;transform:scale(1.06)}
.p-play svg{width:18px;height:18px}
@media(max-width:768px){.p-right{gap:4px}}

/* Volume */
.p-vol{display:flex;align-items:center;gap:6px}
@media(max-width:600px){.p-vol{display:none}}
.p-vol svg{width:16px;height:16px;color:var(--t2);cursor:pointer}
.p-vol svg:hover{color:var(--t1)}
.vol{-webkit-appearance:none;appearance:none;width:72px;height:3px;border-radius:2px;
  background:rgba(255,255,255,.15);outline:none;cursor:pointer}
.vol::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:#fff;cursor:pointer}
.vol::-moz-range-thumb{width:12px;height:12px;border-radius:50%;border:none;
  background:#fff;cursor:pointer}

/* Quality */
.p-q{position:relative}
.p-q-btn{background:none;border:1px solid var(--sep);border-radius:6px;
  padding:3px 8px;font-size:10px;font-weight:700;color:var(--t2);cursor:pointer;
  font-family:var(--font);transition:.15s}
.p-q-btn:hover{border-color:var(--red);color:var(--red)}
.p-q-btn.on{color:var(--red);border-color:rgba(250,36,60,.4)}
@media(max-width:500px){.p-q{display:none}}
.qdd{position:absolute;bottom:calc(100% + 8px);right:0;
  background:rgba(40,40,42,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:4px;min-width:130px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);opacity:0;pointer-events:none;
  transform:translateY(4px);transition:all .18s}
.qdd.show{opacity:1;pointer-events:auto;transform:translateY(0)}
.qo{padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer;
  color:var(--t2);display:flex;align-items:center;justify-content:space-between;
  transition:background .1s}
.qo:hover{background:rgba(255,255,255,.06)}
.qo.on{color:var(--red);font-weight:600}
.qo span{font-size:10px;color:var(--t3);font-weight:600}

/* ========== BOTTOM NAV ========== */
.bnav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);
  background:var(--glass);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid var(--sep);display:none;
  align-items:center;justify-content:space-around;z-index:200}
@media(max-width:768px){.bnav{display:flex}}
.bnav-i{display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;padding:4px 12px;color:var(--t3);transition:.15s}
.bnav-i.active{color:var(--t1)}
.bnav-i svg{width:22px;height:22px}
.bnav-i span{font-size:10px;font-weight:500}

/* ========== LOGIN MODAL ========== */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.4);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  z-index:400;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s}
.mbg.on{opacity:1;pointer-events:auto}
.mdl{background:#1c1c1e;border-radius:16px;width:360px;max-width:calc(100vw - 32px);
  max-height:calc(100vh - 80px);overflow-y:auto;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
  transform:scale(.92);opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1)}
.mbg.on .mdl{transform:scale(1);opacity:1}
.mdl-h{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.mdl-h h2{font-size:18px;font-weight:700}
.mdl-x{background:none;border:none;font-size:22px;cursor:pointer;color:var(--t3);
  padding:2px 6px;border-radius:50%;transition:.1s}
.mdl-x:hover{background:rgba(255,255,255,.06)}
.mdl-b{padding:16px 20px 24px}
.login-tabs{display:flex;background:rgba(255,255,255,.05);border-radius:10px;
  padding:2px;margin-bottom:16px}
.login-tab{flex:1;text-align:center;padding:7px;font-size:13px;font-weight:600;
  border-radius:9px;cursor:pointer;transition:.15s;color:var(--t3)}
.login-tab.on{background:rgba(255,255,255,.1);color:var(--t1)}
.fg{margin-bottom:12px}
.fl{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px;display:block}
.fi{width:100%;height:40px;padding:0 12px;border-radius:10px;
  border:1px solid var(--sep);background:rgba(255,255,255,.04);
  color:var(--t1);font-size:14px;font-family:var(--font);outline:none;transition:.15s}
.fi:focus{border-color:rgba(250,36,60,.5)}
.fi::placeholder{color:var(--t3)}
.fr{display:flex;gap:8px}
.fr .fi{flex:1}
.btn-send{height:40px;padding:0 12px;border-radius:10px;border:none;
  background:rgba(255,255,255,.06);color:var(--red);font-size:12px;
  font-weight:600;cursor:pointer;white-space:nowrap;transition:.15s}
.btn-send:disabled{opacity:.4}
.btn-go{width:100%;height:42px;border-radius:10px;border:none;
  background:var(--red);color:#fff;font-size:15px;font-weight:700;
  cursor:pointer;transition:.15s;margin-top:4px}
.btn-go:hover{background:#e0203a}
.btn-go:disabled{opacity:.4}
.qr-area{text-align:center;padding:16px 0}
.qr-box{width:180px;height:180px;margin:0 auto 12px;border-radius:12px;
  background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden}
.qr-box img{width:100%;height:100%}
.qr-st{font-size:13px;color:var(--t2);margin-bottom:6px}
.qr-tip{font-size:11px;color:var(--t3);line-height:1.5}

/* ========== LYRICS ========== */
.lyr-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);z-index:300;opacity:0;pointer-events:none;
  transition:opacity .3s}
.lyr-bg.on{opacity:1;pointer-events:auto}
.lyr{position:fixed;bottom:0;left:0;right:0;max-height:70vh;
  background:var(--glass);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-radius:16px 16px 0 0;z-index:301;
  transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
  overflow:hidden;display:flex;flex-direction:column;
  border-top:1px solid var(--sep)}
.lyr.on{transform:translateY(0)}
.lyr-h{padding:16px 20px 8px;display:flex;align-items:center;justify-content:space-between}
.lyr-h h3{font-size:16px;font-weight:700}
.lyr-x{background:none;border:none;font-size:20px;cursor:pointer;color:var(--t3);padding:2px 6px}
.lyr-x:hover{color:var(--t1)}
.lyr-b{flex:1;overflow-y:auto;padding:8px 20px 24px}
.lyr-line{padding:8px 0;font-size:15px;color:var(--t3);text-align:center;
  line-height:1.5;transition:all .3s}
.lyr-line.on{color:var(--t1);font-size:17px;font-weight:600}

/* ========== LOADING ========== */
.ld{text-align:center;padding:40px 20px;color:var(--t2);font-size:14px}
.ld::before{content:'';display:inline-block;width:16px;height:16px;
  border:2px solid var(--t3);border-top-color:var(--red);border-radius:50%;
  animation:sp .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--t3);font-size:14px}

/* ========== BACK ========== */
.back{background:none;border:none;color:var(--red);font-size:14px;cursor:pointer;
  padding:4px 0;font-weight:500;margin-bottom:12px}

/* ========== TOAST ========== */
.toast{position:fixed;top:56px;left:50%;transform:translateX(-50%) translateY(-16px);
  background:rgba(44,44,46,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-radius:12px;padding:8px 18px;z-index:500;font-size:13px;font-weight:600;
  color:var(--t1);opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 20px rgba(0,0,0,.4);pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ========== ANIMATIONS ========== */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.section{animation:fadeUp .4s ease both}

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar{width:0;height:0}
</style>
</head>
<body>

<!-- TOP NAV -->
<header class="topnav">
  <div class="topnav-inner">
    <div class="topnav-logo">Sher</div>
    <div class="topnav-tabs" id="topTabs"></div>
    <div class="topnav-actions">
      <div class="topnav-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="搜索" onkeydown="if(event.key==='Enter')doSearch()" oninput="debSearch()">
      </div>
      <button class="topnav-login" id="loginBtn" onclick="openLogin()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
      <div class="topnav-avatar" id="userAv" onclick="go('library')">U</div>
    </div>
  </div>
</header>

<!-- LOGIN MODAL -->
<div class="mbg" id="mbg" onclick="closeLogin()">
  <div class="mdl" id="mdl" onclick="event.stopPropagation()">
    <div class="mdl-h"><h2>登录 Sher</h2><button class="mdl-x" onclick="closeLogin()">&times;</button></div>
    <div class="mdl-b">
      <div class="login-tabs">
        <div class="login-tab on" onclick="swLTab('phone')">手机号</div>
        <div class="login-tab" onclick="swLTab('qr')">扫码</div>
      </div>
      <div id="lPhone">
        <div class="fg"><label class="fl">手机号</label><input class="fi" type="tel" id="phoneIn" placeholder="请输入手机号" maxlength="11"></div>
        <div class="fg"><label class="fl">验证码</label><div class="fr"><input class="fi" type="number" id="codeIn" placeholder="验证码" maxlength="6"><button class="btn-send" id="sendBtn" onclick="sendCode()">发送</button></div></div>
        <button class="btn-go" id="loginBtn2" onclick="phoneLogin()">登录</button>
      </div>
      <div id="lQr" style="display:none">
        <div class="qr-area">
          <div class="qr-box" id="qrBox"><span style="color:var(--t3);font-size:12px">加载中...</span></div>
          <div class="qr-st" id="qrSt">请使用酷狗音乐APP扫码</div>
          <div class="qr-tip">打开酷狗音乐APP → 扫一扫</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- LYRICS -->
<div class="lyr-bg" id="lyrBg" onclick="closeLyr()"></div>
<div class="lyr" id="lyrP">
  <div class="lyr-h"><h3>歌词</h3><button class="lyr-x" onclick="closeLyr()">&times;</button></div>
  <div class="lyr-b" id="lyrB"></div>
</div>

<!-- PAGE -->
<div class="page" id="page"></div>

<!-- PLAYER -->
<div class="player" id="player">
  <div class="p-progress" onclick="seekP(event)"><div class="p-fill" id="pFill"></div></div>
  <div class="p-cover" id="pCov" onclick="openLyr()">♪</div>

<script>
const API=location.origin,aud=document.getElementById('aud');
let tab='recommend',list=[],idx=-1,lyrics=[],lyrOk=false,loggedIn=false,

const TABS=[

  {id:'rank',l:'排行',ic:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>'},

  {id:'library',l:'资料库',ic:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>'},
];

// ===== API =====
function ah(e){const h={...e},p=[];const t=gt(),u=gu();if(t&&u)p.push('token='+t,'userid='+u);if(dfid)p.push('dfid='+dfid);if(p.length)h['Cookie']=p.join('; ');return h}
async function ap(p){try{const r=await fetch(API+p,{headers:ah()});const d=await r.json();return d.data||d}catch(e){return null}}
async function apP(p,b){try{const r=await fetch(API+p,{method:'POST',headers:ah({'Content-Type':'application/x-www-form-urlencoded'}),body:b});return await r.json()}catch(e){return null}}

// ===== Init =====
function init(){
  buildTabs();buildBnav();chkLogin();regDev();go('recommend');
}
async function regDev(){dfid=localStorage.getItem('kg_dfid')||'';try{const r=await fetch(API+'/register/dev',{method:'POST',headers:ah()});const d=await r.json();const f=d?.data?.dfid||d?.dfid;if(f){dfid=f;localStorage.setItem('kg_dfid',f)}}catch(e){}}

function buildTabs(){
  document.getElementById('topTabs').innerHTML=TABS.map(t=>
    '<div class="topnav-tab'+(t.id===tab?' active':'')+'" data-t="'+t.id+'" onclick="go(\''+t.id+'\')">'+t.l+'</div>'
  ).join('');
}
function buildBnav(){
  document.getElementById('bnav').innerHTML=TABS.map(t=>
    '<div class="bnav-i'+(t.id===tab?' active':'')+'" data-t="'+t.id+'" onclick="go(\''+t.id+'\')">'+t.ic+'<span>'+t.l+'</span></div>'
  ).join('');
}
function go(t){
  tab=t;
  document.querySelectorAll('.topnav-tab,.bnav-i').forEach(e=>e.classList.toggle('active',e.dataset.t===t));
  loadTab(t);
}
async function loadTab(t){
  const p=document.getElementById('page');
  p.innerHTML='<div class="ld">加载中</div>';
  switch(t){
    case 'recommend':await loadRec(p);break;
    case 'browse':await loadBrowse(p);break;

// ===== Recommend =====
async function loadRec(p){
  const [s,h,b]=await Promise.all([ap('/recommend/songs'),ap('/search/hot'),ap('/yueku/banner')]);
  let html='<div class="page-title">首页</div>';
  // Quick links
  html+='<div class="grad-row">'+
    '<div class="grad-card" style="background:linear-gradient(135deg,#667eea,#764ba2)" onclick="loadDaily()"><div class="gc-t">每日推荐</div><div class="gc-s">根据你的口味生成</div></div>'+
    '<div class="grad-card" style="background:linear-gradient(135deg,#f093fb,#f5576c)" onclick="go(\'fm\')"><div class="gc-t">私人FM</div><div class="gc-s">懂你的音乐电台</div></div>'+
    '<div class="grad-card" style="background:linear-gradient(135deg,#4facfe,#00f2fe)" onclick="go(\'rank\')"><div class="gc-t">排行榜</div><div class="gc-s">热门音乐风向标</div></div>'+
    '<div class="grad-card" style="background:linear-gradient(135deg,#a18cd1,#fbc2eb)" onclick="go(\'browse\')"><div class="gc-t">歌单</div><div class="gc-s">发现更多精彩歌单</div></div></div>';
  // Hot search
  if(h?.list?.[0]){
    html+='<div class="section"><div class="section-head"><div class="section-title">热搜</div></div><div class="tags">'+
      h.list[0].keywords.slice(0,8).map(k=>'<div class="tag" onclick="searchKW(\''+esc(k.keyword)+'\')">'+esc(k.keyword)+'</div>').join('')+'</div></div>';
  }
  // Songs

  if(songs.length){list=songs;
    html+='<div class="section"><div class="section-head"><div class="section-title">推荐歌曲</div></div>'+rsl(songs)+'</div>';

async function loadDaily(){
  const p=document.getElementById('page');p.innerHTML='<div class="ld">加载中</div>';

// ===== Browse =====
async function loadBrowse(p){
  const d=await ap('/top/playlist?category_id=0&pagesize=20');

    ls.map(s=>{const cv=(s.imgurl||s.flexible_cover||'').replace('{size}','400');

        '<div class="card-art">'+(cv?'<img src="'+cv+'" loading="lazy" onerror="this.outerHTML=\'<div class=card-art-placeholder>♪</div>\'">':'<div class="card-art-placeholder">♪</div>')+'</div>'+
        '<div class="card-name">'+esc(s.specialname||s.listname)+'</div><div class="card-sub">'+(s.songcount||0)+'首</div></div>';

async function loadPD(id,name){

  const d=await ap('/playlist/track/all?id='+encodeURIComponent(id)+'&page=1&pagesize=100');

// ===== Rank =====
async function loadRank(p){
  const d=await ap('/rank/list');
  if(!d?.info){p.innerHTML='<div class="empty">加载失败</div>';return}
  const rs=d.info.map(r=>({id:r.rankid,name:r.rankname,
    img:(r.album_img_9||r.img_9||r.banner_9||'').replace('{size}','400')}));

      '<div class="card-name">'+esc(r.name)+'</div></div>').join('')+'</div></div>';

async function loadRD(id,name){
  const p=document.getElementById('page');p.innerHTML='<div class="ld">加载中</div>';

  const d=await ap('/rank/audio?rankid='+id+'&page=1&pagesize=50');

// ===== FM =====
async function loadFM(p){
  let songs=[];const d=await ap('/personal/fm');
  if(d?.songs)songs=d.songs.map(ps);
  if(!songs.length){const r=await ap('/recommend/songs');if(r?.song_list)songs=r.song_list.map(ps);}

// ===== Library =====
async function loadLib(p){
  if(!loggedIn){
    p.innerHTML='<div class="page-title">资料库</div><div class="empty" style="padding:60px 20px"><div style="font-size:48px;margin-bottom:12px">♪</div><div style="font-size:16px;font-weight:600;margin-bottom:6px">登录 Sher</div><div style="font-size:13px;color:var(--t2);margin-bottom:16px">同步你的歌单和收藏</div><button class="btn-go" style="width:160px;margin:0 auto;display:block" onclick="openLogin()">立即登录</button></div>';
    return;
  }
  p.innerHTML='<div class="ld">加载中</div>';let html='<div class="page-title">资料库</div>';
  const dt=await ap('/user/detail');
  if(dt)html+='<div class="section" style="display:flex;align-items:center;gap:12px"><div class="topnav-avatar" style="display:flex;width:44px;height:44px;font-size:18px">'+(dt.nick_name||'U')[0]+'</div><div><div style="font-size:16px;font-weight:700">'+esc(dt.nick_name||'用户')+'</div><div style="font-size:12px;color:var(--t2)">'+(dt.fans_count||0)+' 粉丝</div></div></div>';
  const pl=await ap('/user/playlist?userid='+gu());
  if(pl){const ls=pl.info||pl.list||pl.special_list||[];
    if(ls.length)html+='<div class="section"><div class="section-head"><div class="section-title">歌单</div></div><div class="hrow">'+ls.map(s=>{
      const cv=(s.imgurl||s.flexible_cover||'').replace('{size}','400');
      return'<div class="card" onclick="loadPD(\''+(s.global_collection_id||s.specialid)+'\',\''+esc(s.specialname||s.listname||'')+'\')"><div class="card-art">'+(cv?'<img src="'+cv+'" loading="lazy">':'<div class="card-art-placeholder">♪</div>')+'</div><div class="card-name">'+esc(s.specialname||s.listname||'')+'</div><div class="card-sub">'+(s.songcount||0)+'首</div></div>';
    }).join('')+'</div></div>';}
  const hi=await ap('/user/history');
  if(hi){const raw=hi.songs||hi.info||hi.list||[];const songs=raw.map(i=>ps(i.info||i));
    if(songs.length)html+='<div class="section"><div class="section-head"><div class="section-title">最近播放</div></div>'+rsl(songs.slice(0,15))+'</div>';}
  html+='<div style="text-align:center;padding:16px"><button class="section-link" onclick="logout()">退出登录</button></div>';
  p.innerHTML=html;
}

// ===== Search =====
function debSearch(){clearTimeout(sTimer);const q=document.getElementById('searchInput').value.trim();if(q.length<1)return;sTimer=setTimeout(doSearch,120)}
function doSearch(){
  const q=document.getElementById('searchInput').value.trim();if(!q)return;
  clearTimeout(sTimer);if(sAbort)sAbort.abort();sAbort=new AbortController();
  const p=document.getElementById('page');p.innerHTML='<div class="ld">搜索中</div>';
  fetch(API+'/search/complex?keywords='+encodeURIComponent(q)+'&page=1&pagesize=20',{headers:ah(),signal:sAbort.signal})
  .then(r=>r.json()).then(d=>{
    const dd=d?.data||d;let songs=[];
    if(dd?.lists){const sg=dd.lists.find(l=>l.type==='song');if(sg?.lists)songs=sg.lists.map(ps);}
    if(!songs.length&&dd?.song_list)songs=dd.song_list.map(ps);
    list=songs;
    p.innerHTML='<div class="page-title">搜索</div><button class="back" onclick="go(\'recommend\')">← 返回</button><div class="section"><div class="section-head"><div class="section-title">'+esc(q)+'</div></div>'+(songs.length?rsl(songs.slice(0,20)):'<div class="empty">未找到结果</div>')+'</div>';
  }).catch(e=>{if(e.name!=='AbortError')p.innerHTML='<div class="empty">搜索失败</div>'});
}
function searchKW(k){document.getElementById('searchInput').value=k;doSearch()}

// ===== Song Parsing =====
function ps(s){
  let n=s.songname||s.audio_name||s.filename||s.name||s.FileName||'';
  let a=s.singername||s.author_name||s.SingerName||s.author||'';
  if(!a&&n.includes(' - ')){const p=n.split(' - ');a=p[0].trim();n=p.slice(1).join(' - ').trim();}
  const c=(s.sizable_cover||s.trans_param?.union_cover||s.cover||s.album_cover||'').replace('{size}','200');
  return{name:n,artist:a,hash:s.hash||s.FileHash||'',albumId:s.album_id||s.AlbumID||'',
    albumName:s.albumname||s.AlbumName||'',dur:s.timelength?Math.round(s.timelength/1000):(s.duration||0),cover:c};
}
function rsl(songs){
  return '<div class="song-list">'+songs.map((s,i)=>
    '<div class="song-row'+(idx===i?' playing':'')+'" onclick="play('+i+')" id="sr-'+i+'">'+
    '<div class="song-r-num">'+(i+1)+'</div>'+
    '<div class="song-r-art">'+(s.cover?'<img src="'+s.cover+'" loading="lazy" onerror="this.parentNode.textContent=\'♪\'">':'♪')+'</div>'+
    '<div class="song-r-info"><div class="song-r-name">'+esc(s.name)+'</div><div class="song-r-artist">'+esc(s.artist)+'</div></div>'+
    '<div class="song-r-dur">'+ft(s.dur)+'</div></div>'
  ).join('')+'</div>';
}

// ===== Player =====
async function play(i){
  if(i<0||i>=list.length)return;idx=i;const s=list[i];
  const bar=document.getElementById('player');bar.classList.add('show');
  document.getElementById('pTitle').textContent=s.name;
  document.getElementById('pArt').textContent=s.artist;
  document.getElementById('pCov').innerHTML=s.cover?'<img src="'+s.cover+'">':'♪';
  setPI(true);hl(i);
  if(!s.hash){document.getElementById('pTitle').textContent+=' (无hash)';return}
  try{
    const d=await ap('/song/url?hash='+s.hash+'&album_id='+(s.albumId||'')+'&quality='+qual+'&free_part=1');
    const u=d?.url?.[0]||d?.backupUrl?.[0]||d?.url||'';
    if(u){aud.src=u;aud.play().catch(()=>{});lyrOk=false;loadLyr(s)}
    else document.getElementById('pTitle').textContent+=' (无法播放)';
  }catch(e){document.getElementById('pTitle').textContent+=' (获取失败)';}
}
function togPlay(){if(aud.paused){aud.play();setPI(true)}else{aud.pause();setPI(false)}}
function setPI(p){
  document.getElementById('playIco').innerHTML=p?'<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>':'<polygon points="8,5 19,12 8,19"/>';
}
function togLoop(){
  loop=(loop+1)%3;const b=document.getElementById('loopBtn'),ic=document.getElementById('loopIco');
  b.title=['列表循环','单曲循环','随机播放'][loop];
  if(loop===0)ic.innerHTML='<polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>';
  else if(loop===1)ic.innerHTML='<polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/><text x="12" y="15" text-anchor="middle" font-size="9" font-weight="700" fill="currentColor" stroke="none">1</text>';
  else ic.innerHTML='<polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/>';
}
function next(){if(!list.length)return;if(loop===2)play(Math.floor(Math.random()*list.length));else play((idx+1)%list.length)}
function prev(){if(list.length)play((idx-1+list.length)%list.length)}
function seekP(e){if(aud.duration)aud.currentTime=(e.offsetX/e.currentTarget.offsetWidth)*aud.duration}
function hl(i){if(lastHl>=0){const p=document.getElementById('sr-'+lastHl);if(p)p.classList.remove('playing')}lastHl=i;const e=document.getElementById('sr-'+i);if(e)e.classList.add('playing')}

aud.addEventListener('timeupdate',()=>{if(!aud.duration)return;document.getElementById('pFill').style.width=aud.currentTime/aud.duration*100+'%'});
aud.addEventListener('ended',()=>{if(loop===1){aud.currentTime=0;aud.play()}else next()});
aud.addEventListener('play',()=>setPI(true));
aud.addEventListener('pause',()=>setPI(false));

// ===== Lyrics =====
async function loadLyr(s){if(!s.hash)return;try{const r=await ap('/search/lyric?hash='+s.hash+'&page=1&pagesize=5');
  const c=r?.candidates||[];if(!c.length)return;const x=c[0];
  const d=await ap('/lyric?id='+encodeURIComponent(x.id)+'&accesskey='+encodeURIComponent(x.accesskey)+'&decode=true');
  const txt=d?.decodeContent||d?.content||'';if(txt){lyrics=parseLyr(txt);lyrOk=true}}catch(e){}}
function parseLyr(t){const ls=t.split('\n'),r=[];const lr=/^\[(\d{2}):(\d{2})\.(\d{2,3})\]/,kr=/^\[(\d+),\d+\]/;
  for(const l of ls){const m=l.match(lr);if(m){const t=parseInt(m[1])*60+parseInt(m[2])+parseInt(m[3])/(m[3].length===3?1000:100);const c=l.replace(lr,'').trim();if(c)r.push({t,c});continue}
  const k=l.match(kr);if(k){const t=parseInt(k[1])/1000;const c=l.replace(kr,'').replace(/<\d+,\d+,\d+>/g,'').trim();if(c)r.push({t,c})}}
  return r.sort((a,b)=>a.t-b.t)}
function openLyr(){document.getElementById('lyrBg').classList.add('on');document.getElementById('lyrP').classList.add('on');updLyr()}
function closeLyr(){document.getElementById('lyrBg').classList.remove('on');document.getElementById('lyrP').classList.remove('on')}
function updLyr(){const p=document.getElementById('lyrB');if(!lyrics.length){p.innerHTML='<div class="empty">暂无歌词</div>';return}
  let ai=-1;for(let i=lyrics.length-1;i>=0;i--){if(aud.currentTime>=lyrics[i].t){ai=i;break}}
  p.innerHTML=lyrics.map((l,i)=>'<div class="lyr-line'+(i===ai?' on':'')+'">'+esc(l.c)+'</div>').join('');
  const a=p.querySelector('.lyr-line.on');if(a)a.scrollIntoView({behavior:'smooth',block:'center'})}

// ===== Login =====
let ltab='phone';
function openLogin(){document.getElementById('mbg').classList.add('on');if(ltab==='qr')loadQR()}
function closeLogin(){document.getElementById('mbg').classList.remove('on');stopQR()}
function swLTab(t){ltab=t;document.querySelectorAll('.login-tab').forEach(e=>e.classList.toggle('on',e.textContent.includes(t==='phone'?'手机号':'扫码')));
  document.getElementById('lPhone').style.display=t==='phone'?'':'none';document.getElementById('lQr').style.display=t==='qr'?'':'none';if(t==='qr')loadQR();else stopQR()}
async function sendCode(){const ph=document.getElementById('phoneIn').value.trim();if(!/^1\d{10}$/.test(ph)){alert('请输入正确的手机号');return}
  const b=document.getElementById('sendBtn');b.disabled=true;try{const d=await ap('/captcha/sent?mobile='+ph);
    if(d&&(d.status===1||d.code===200)){b.textContent='60s';let c=60;const t=setInterval(()=>{c--;b.textContent=c+'s';if(c<=0){clearInterval(t);b.textContent='发送';b.disabled=false}},1000)}
    else{alert(d?.error_msg||'发送失败');b.disabled=false}}catch(e){alert('发送失败');b.disabled=false}}
async function phoneLogin(){const ph=document.getElementById('phoneIn').value.trim(),co=document.getElementById('codeIn').value.trim();
  if(!/^1\d{10}$/.test(ph)){alert('请输入正确的手机号');return}if(!co){alert('请输入验证码');return}
  const b=document.getElementById('loginBtn2');b.disabled=true;b.textContent='登录中...';
  try{const d=await apP('/login/cellphone','mobile='+encodeURIComponent(ph)+'&code='+encodeURIComponent(co));
    const dd=d?.data;if(dd?.token||d?.status===1){saveL(dd?.token||'',String(dd?.userid||''));closeLogin();onLogin()}
    else alert(d?.error_msg||'登录失败')}catch(e){alert('登录失败')}b.disabled=false;b.textContent='登录'}

// QR Login
let qrK='';
async function loadQR(){const b=document.getElementById('qrBox'),st=document.getElementById('qrSt');
  b.innerHTML='<span style="color:var(--t3);font-size:12px">加载中...</span>';st.textContent='生成二维码...';
  try{const k=await ap('/login/qr/key?type=web');const key=k?.qrcode||k?.key;
    if(!key){b.innerHTML='<span style="color:var(--t3);font-size:12px">获取失败</span>';return}qrK=key;
    const c=await ap('/login/qr/create?key='+qrK+'&qrimg=true&type=web');
    const img=c?.base64||k?.qrcode_img;
    if(img){b.innerHTML='<img src="'+img+'">';st.textContent='请使用酷狗音乐APP扫码';startQR()}
    else b.innerHTML='<span style="color:var(--t3);font-size:12px">生成失败</span>'}catch(e){b.innerHTML='<span style="color:var(--t3);font-size:12px">加载失败</span>'}}
function startQR(){stopQR();qrTimer=setInterval(chkQR,2000)}
function stopQR(){if(qrTimer){clearInterval(qrTimer);qrTimer=null}}
async function chkQR(){if(!qrK)return;try{const d=await ap('/login/qr/check?key='+qrK);if(!d)return;
  const s=d.status??1,st=document.getElementById('qrSt');
  if(s===0){st.textContent='已过期，请刷新';stopQR()}else if(s===1)st.textContent='请使用酷狗音乐APP扫码';
  else if(s===2){st.textContent='扫码成功，请确认';st.style.color='#30d158'}
  else if(s===4){st.textContent='登录成功！';st.style.color='#30d158';stopQR();
    saveL(d.token||'',String(d.userid||''));toast('登录成功');setTimeout(()=>{closeLogin();onLogin()},500)}}catch(e){}}

// Auth
function saveL(t,u){localStorage.setItem('kg_token',t);localStorage.setItem('kg_userid',u);loggedIn=true}
function gt(){return localStorage.getItem('kg_token')||''}
function gu(){return localStorage.getItem('kg_userid')||''}
function logout(){localStorage.removeItem('kg_token');localStorage.removeItem('kg_userid');loggedIn=false;updLogin();go('library')}
function chkLogin(){loggedIn=!!(gt()&&gu());updLogin()}
function updLogin(){
  document.getElementById('loginBtn').style.display=loggedIn?'none':'';
  document.getElementById('userAv').style.display=loggedIn?'flex':'none';
}
function onLogin(){chkLogin();if(tab==='library')loadTab('library')}

// ===== Volume =====
aud.volume=.8;
function setVol(v){aud.volume=v/100;updVI(v);localStorage.setItem('kg_vol',v)}
function togMute(){const s=document.getElementById('volR');if(aud.volume>0){prevVol=s.value;setVol(0);s.value=0}else{setVol(prevVol||80);s.value=prevVol||80}}
function updVI(v){const i=document.getElementById('volIco');
  if(v==0)i.innerHTML='<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
  else if(v<50)i.innerHTML='<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>';
  else i.innerHTML='<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>';}
(function(){const v=localStorage.getItem('kg_vol');if(v!==null){aud.volume=v/100;document.getElementById('volR').value=v;updVI(v)}})();

// ===== Quality =====
function togQ(){document.getElementById('qDd').classList.toggle('show')}
function setQ(q){qual=q;localStorage.setItem('kg_quality',q);
  const b=document.getElementById('qBtn'),lb={128:'128',320:'320',flac:'FLAC'};
  b.textContent=lb[q]||q;b.classList.toggle('on',q!=='128');
  document.querySelectorAll('.qo').forEach(o=>o.classList.toggle('on',o.dataset.q===q));
  document.getElementById('qDd').classList.remove('show');if(idx>=0)play(idx)}
(function(){const q=localStorage.getItem('kg_quality');if(q)setQ(q)})();
document.addEventListener('click',e=>{if(!e.target.closest('.p-q'))document.getElementById('qDd').classList.remove('show')});

// ===== Utils =====
function ft(s){if(!s||s<0)return'0:00';return Math.floor(s/60)+':'+(Math.floor(s%60)<10?'0':'')+Math.floor(s%60)}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function toast(m){let t=document.querySelector('.toast');if(!t){t=document.createElement('div');t.className='toast';document.body.appendChild(t)}
  t.textContent=m;requestAnimationFrame(()=>t.classList.add('on'));setTimeout(()=>t.classList.remove('on'),2500)}

init();
</script>
