<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sher</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000;--bg2:#181818;--bg3:#282828;
  --red:#fa243c;--pink:#fc3c44;--purple:#bf5af2;
  --t1:#fff;--t2:#a1a1a6;--t3:#6e6e73;
  --sep:rgba(255,255,255,.08);
  --glass:rgba(22,22,23,.88);
  --sidebar-w:240px;
  --player-h:72px;--nav-h:56px;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','PingFang SC','Helvetica Neue',sans-serif;
  --font-cn:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--t1);
  -webkit-font-smoothing:antialiased;min-height:100vh;
  display:flex;overflow-x:hidden}

/* ===== SIDEBAR (desktop) ===== */
.sidebar{width:var(--sidebar-w);flex-shrink:0;height:100vh;
  position:sticky;top:0;display:flex;flex-direction:column;
  background:rgba(30,30,30,.6);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border-right:1px solid var(--sep);padding:16px 0;overflow-y:auto;z-index:50}
.sidebar-logo{padding:8px 20px 20px;font-size:22px;font-weight:800;
  color:var(--red);font-style:italic;letter-spacing:-.5px}
.sidebar-section{margin-bottom:4px}
.sidebar-label{padding:8px 20px 4px;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.8px;color:var(--t3)}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:7px 20px;
  font-size:14px;font-weight:500;color:var(--t2);cursor:pointer;
  transition:color .15s,background .15s;border-radius:6px;margin:0 8px}
.sidebar-item:hover{color:var(--t1);background:rgba(255,255,255,.05)}
.sidebar-item.active{color:var(--t1);background:rgba(255,255,255,.08);font-weight:600}
.sidebar-item svg{width:18px;height:18px;flex-shrink:0;opacity:.7}
.sidebar-item.active svg{opacity:1}
.sidebar-search{margin:0 12px 12px;position:relative}
.sidebar-search input{width:100%;height:34px;padding:0 12px 0 32px;border-radius:8px;
  border:none;background:rgba(255,255,255,.08);color:var(--t1);font-size:13px;
  font-family:var(--font);outline:none;transition:background .15s}
.sidebar-search input:focus{background:rgba(255,255,255,.12)}
.sidebar-search input::placeholder{color:var(--t3)}
.sidebar-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;color:var(--t3)}
.sidebar-login{display:flex;align-items:center;gap:10px;padding:7px 20px;
  font-size:14px;color:var(--t2);cursor:pointer;margin:0 8px;border-radius:6px;
  transition:color .15s,background .15s}
.sidebar-login:hover{color:var(--t1);background:rgba(255,255,255,.05)}
.sidebar-login svg{width:18px;height:18px;opacity:.7}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:7px 20px;
  margin:0 8px;border-radius:6px;cursor:pointer;transition:background .15s}
.sidebar-user:hover{background:rgba(255,255,255,.05)}
.sidebar-avatar{width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,var(--red),var(--purple));
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:12px;font-weight:700}
.sidebar-username{font-size:14px;font-weight:600;color:var(--t1)}
@media(max-width:900px){.sidebar{display:none}}

/* ===== MAIN ===== */
.main{flex:1;min-width:0;display:flex;flex-direction:column;
  height:100vh;overflow-y:auto;scroll-behavior:smooth;
  padding-bottom:calc(var(--player-h) + var(--nav-h))}
@media(min-width:901px){.main{padding-bottom:var(--player-h)}}

/* ===== TOP BAR ===== */
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;
  justify-content:space-between;padding:12px 28px;height:52px;
  background:rgba(0,0,0,.65);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px)}
.topbar-title{font-size:18px;font-weight:700;letter-spacing:-.3px}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-search{position:relative;display:none}
.topbar-search input{width:160px;height:32px;padding:0 12px 0 30px;border-radius:8px;
  border:none;background:rgba(255,255,255,.08);color:var(--t1);font-size:13px;
  font-family:var(--font);outline:none;transition:width .2s}
.topbar-search input:focus{width:240px}
.topbar-search input::placeholder{color:var(--t3)}
.topbar-search svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;color:var(--t3)}
@media(max-width:900px){.topbar-search{display:block}}

/* ===== CONTENT ===== */
.content{max-width:1200px;margin:0 auto;padding:0 28px 40px;width:100%}
@media(max-width:900px){.content{padding:0 16px 32px}}

/* ===== PAGE HEADER ===== */
.page-head{padding:20px 0 28px}
.page-title{font-size:40px;font-weight:800;letter-spacing:-.8px;line-height:1.1}
@media(max-width:768px){.page-title{font-size:30px}}

/* ===== SECTION ===== */
.section{margin-bottom:44px}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:22px;font-weight:700;letter-spacing:-.3px}
@media(max-width:768px){.section-title{font-size:18px}}
.section-more{font-size:13px;color:var(--red);cursor:pointer;font-weight:600;
  background:none;border:none;padding:4px 0}
.section-more:hover{opacity:.8}

/* ===== EDITORIAL HERO ROW ===== */
.hero-row{display:flex;gap:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;margin-bottom:28px;scroll-snap-type:x mandatory}
.hero-row::-webkit-scrollbar{display:none}
.hero-card{flex-shrink:0;width:280px;height:140px;border-radius:12px;padding:20px;
  color:#fff;cursor:pointer;position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:flex-end;
  transition:transform .2s;scroll-snap-align:start}
.hero-card:active{transform:scale(.97)}
.hero-card .hc-title{font-size:18px;font-weight:700;line-height:1.2;position:relative;z-index:1}
.hero-card .hc-sub{font-size:12px;opacity:.75;margin-top:4px;position:relative;z-index:1}
.hero-card::after{content:'';position:absolute;inset:0;
  background:linear-gradient(0deg,rgba(0,0,0,.45) 0%,transparent 60%);pointer-events:none}
@media(max-width:768px){.hero-card{width:240px;height:120px;padding:16px}}

/* ===== HORIZONTAL SCROLL ===== */
.hrow{display:flex;gap:18px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scroll-snap-type:x mandatory;scrollbar-width:none;padding-bottom:4px}
.hrow::-webkit-scrollbar{display:none}
@media(max-width:768px){.hrow{gap:14px}}

/* ===== ALBUM CARD (square) ===== */
.card{flex-shrink:0;width:170px;scroll-snap-align:start;cursor:pointer;
  transition:transform .2s}
.card:active{transform:scale(.97)}
@media(max-width:768px){.card{width:148px}}
.card-art{width:100%;aspect-ratio:1;border-radius:10px;overflow:hidden;
  background:var(--bg2);position:relative;
  box-shadow:0 4px 16px rgba(0,0,0,.3)}
.card-art img{width:100%;height:100%;object-fit:cover;display:block}
.card-art-ph{width:100%;height:100%;display:flex;align-items:center;
  justify-content:center;font-size:36px;background:linear-gradient(135deg,#1a1a1a,#2a2a2a)}
.card-play{position:absolute;bottom:8px;right:8px;width:36px;height:36px;
  border-radius:50%;background:rgba(250,36,60,.92);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:translateY(4px);transition:all .2s;box-shadow:0 2px 12px rgba(250,36,60,.4)}
.card-play svg{width:16px;height:16px;color:#fff;margin-left:1px}
.card:hover .card-play{opacity:1;transform:translateY(0)}
.card-title{font-size:14px;font-weight:600;margin-top:8px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.card-sub{font-size:12px;color:var(--t2);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ===== WIDE CARD (playlist row) ===== */
.wcard{flex-shrink:0;width:300px;scroll-snap-align:start;cursor:pointer;
  display:flex;gap:12px;align-items:center;padding:10px 12px;border-radius:10px;
  transition:background .15s}
.wcard:active{background:rgba(255,255,255,.04)}
.wcard-art{width:52px;height:52px;border-radius:8px;overflow:hidden;
  background:var(--bg2);flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.wcard-art img{width:100%;height:100%;object-fit:cover}
.wcard-info{min-width:0}
.wcard-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis}
.wcard-sub{font-size:12px;color:var(--t2);margin-top:2px}

/* ===== SONG LIST ===== */
.song-list{display:flex;flex-direction:column}
.song-row{display:flex;align-items:center;padding:8px 10px;gap:12px;cursor:pointer;
  border-radius:8px;transition:background .12s}
.song-row:hover{background:rgba(255,255,255,.04)}
.song-row:active{background:rgba(255,255,255,.06)}
.song-row.playing .song-r-name{color:var(--red)}
.song-row.playing .song-r-num{color:var(--red)}
.song-r-num{width:28px;text-align:right;font-size:14px;color:var(--t3);
  flex-shrink:0;font-variant-numeric:tabular-nums}
.song-r-art{width:44px;height:44px;border-radius:6px;background:var(--bg2);
  flex-shrink:0;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.song-r-art img{width:100%;height:100%;object-fit:cover}
.song-r-info{flex:1;min-width:0}
.song-r-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;line-height:1.3}
.song-r-artist{font-size:13px;color:var(--t2);margin-top:1px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.song-r-dur{font-size:13px;color:var(--t3);flex-shrink:0;font-variant-numeric:tabular-nums}
@media(max-width:768px){.song-r-num{width:24px;font-size:13px}}

/* ===== CATEGORY GRID ===== */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.cat-card{height:80px;border-radius:10px;padding:14px;cursor:pointer;
  color:#fff;position:relative;overflow:hidden;display:flex;align-items:flex-end;
  font-size:15px;font-weight:700;transition:transform .15s}
.cat-card:active{transform:scale(.97)}
.cat-card::after{content:'';position:absolute;inset:0;
  background:linear-gradient(0deg,rgba(0,0,0,.3) 0%,transparent 60%);pointer-events:none}
@media(max-width:768px){.cat-grid{grid-template-columns:repeat(2,1fr)}}

/* ===== PLAYER BAR ===== */
.player{position:fixed;bottom:var(--nav-h);left:0;right:0;
  height:var(--player-h);background:var(--glass);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid var(--sep);z-index:200;display:flex;align-items:center;
  padding:0 16px;gap:12px;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.player.show{transform:translateY(0)}
@media(min-width:901px){.player{bottom:0}}
.p-progress{position:absolute;top:-2px;left:0;right:0;height:4px;
  background:rgba(255,255,255,.06);cursor:pointer;z-index:1}
.p-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--pink));
  width:0;transition:width .2s;border-radius:0 2px 2px 0}
.p-cover{width:50px;height:50px;border-radius:8px;background:var(--bg2);
  flex-shrink:0;overflow:hidden;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.p-cover img{width:100%;height:100%;object-fit:cover}
.p-info{flex:1;min-width:0;cursor:pointer}
.p-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis}
.p-artist{font-size:12px;color:var(--t2);margin-top:1px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.p-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.p-btn{background:none;border:none;cursor:pointer;width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;border-radius:50%;
  color:var(--t2);transition:.15s}
.p-btn:hover{color:var(--t1);background:rgba(255,255,255,.06)}
.p-btn svg{width:18px;height:18px}
.p-play{width:38px;height:38px;background:var(--red);color:#fff;border-radius:50%;
  box-shadow:0 2px 14px rgba(250,36,60,.35)}
.p-play:hover{background:#e0203a;transform:scale(1.06)}
.p-play svg{width:18px;height:18px}
@media(max-width:768px){.p-right{gap:4px}.p-cover{width:44px;height:44px}}

/* Volume */
.p-vol{display:flex;align-items:center;gap:6px}
@media(max-width:700px){.p-vol{display:none}}
.p-vol svg{width:16px;height:16px;color:var(--t2);cursor:pointer}
.p-vol svg:hover{color:var(--t1)}
.vol{-webkit-appearance:none;appearance:none;width:72px;height:3px;border-radius:2px;
  background:rgba(255,255,255,.15);outline:none;cursor:pointer}
.vol::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:#fff;cursor:pointer}
.vol::-moz-range-thumb{width:12px;height:12px;border-radius:50%;border:none;
  background:#fff;cursor:pointer}

/* Quality */
.p-q{position:relative}
.p-q-btn{background:none;border:1px solid var(--sep);border-radius:6px;
  padding:3px 8px;font-size:10px;font-weight:700;color:var(--t2);cursor:pointer;
  font-family:var(--font);transition:.15s}
.p-q-btn:hover{border-color:var(--red);color:var(--red)}
.p-q-btn.on{color:var(--red);border-color:rgba(250,36,60,.4)}
@media(max-width:500px){.p-q{display:none}}
.qdd{position:absolute;bottom:calc(100% + 8px);right:0;
  background:rgba(40,40,42,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:4px;min-width:130px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);opacity:0;pointer-events:none;
  transform:translateY(4px);transition:all .18s}
.qdd.show{opacity:1;pointer-events:auto;transform:translateY(0)}
.qo{padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer;
  color:var(--t2);display:flex;align-items:center;justify-content:space-between;
  transition:background .1s}
.qo:hover{background:rgba(255,255,255,.06)}
.qo.on{color:var(--red);font-weight:600}
.qo span{font-size:10px;color:var(--t3);font-weight:600}

/* ===== BOTTOM NAV (mobile) ===== */
.bnav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);
  background:var(--glass);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid var(--sep);display:none;
  align-items:center;justify-content:space-around;z-index:200}
@media(max-width:900px){.bnav{display:flex}}
.bnav-i{display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;padding:4px 14px;color:var(--t3);transition:.15s}
.bnav-i.active{color:var(--t1)}
.bnav-i svg{width:22px;height:22px}
.bnav-i span{font-size:10px;font-weight:600}

/* ===== LOGIN MODAL ===== */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.45);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  z-index:400;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s}
.mbg.on{opacity:1;pointer-events:auto}
.mdl{background:#1c1c1e;border-radius:16px;width:360px;max-width:calc(100vw - 32px);
  max-height:calc(100vh - 80px);overflow-y:auto;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
  transform:scale(.92);opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1)}
.mbg.on .mdl{transform:scale(1);opacity:1}
.mdl-h{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.mdl-h h2{font-size:18px;font-weight:700}
.mdl-x{background:none;border:none;font-size:22px;cursor:pointer;color:var(--t3);
  padding:2px 6px;border-radius:50%;transition:.1s}
.mdl-x:hover{background:rgba(255,255,255,.06)}
.mdl-b{padding:16px 20px 24px}
.login-tabs{display:flex;background:rgba(255,255,255,.05);border-radius:10px;
  padding:2px;margin-bottom:16px}
.login-tab{flex:1;text-align:center;padding:7px;font-size:13px;font-weight:600;
  border-radius:9px;cursor:pointer;transition:.15s;color:var(--t3)}
.login-tab.on{background:rgba(255,255,255,.1);color:var(--t1)}
.fg{margin-bottom:12px}
.fl{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px;display:block}
.fi{width:100%;height:40px;padding:0 12px;border-radius:10px;
  border:1px solid var(--sep);background:rgba(255,255,255,.04);
  color:var(--t1);font-size:14px;font-family:var(--font);outline:none;transition:.15s}
.fi:focus{border-color:rgba(250,36,60,.5)}
.fi::placeholder{color:var(--t3)}
.fr{display:flex;gap:8px}
.fr .fi{flex:1}
.btn-send{height:40px;padding:0 12px;border-radius:10px;border:none;
  background:rgba(255,255,255,.06);color:var(--red);font-size:12px;
  font-weight:600;cursor:pointer;white-space:nowrap;transition:.15s}
.btn-send:disabled{opacity:.4}
.btn-go{width:100%;height:42px;border-radius:10px;border:none;
  background:var(--red);color:#fff;font-size:15px;font-weight:700;
  cursor:pointer;transition:.15s;margin-top:4px}
.btn-go:hover{background:#e0203a}
.btn-go:disabled{opacity:.4}
.qr-area{text-align:center;padding:16px 0}
.qr-box{width:180px;height:180px;margin:0 auto 12px;border-radius:12px;
  background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden}
.qr-box img{width:100%;height:100%}
.qr-st{font-size:13px;color:var(--t2);margin-bottom:6px}
.qr-tip{font-size:11px;color:var(--t3);line-height:1.5}

/* ===== LYRICS ===== */
.lyr-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);z-index:300;opacity:0;pointer-events:none;
  transition:opacity .3s}
.lyr-bg.on{opacity:1;pointer-events:auto}
.lyr{position:fixed;bottom:0;left:0;right:0;max-height:70vh;
  background:var(--glass);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-radius:16px 16px 0 0;z-index:301;
  transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
  overflow:hidden;display:flex;flex-direction:column;
  border-top:1px solid var(--sep)}
.lyr.on{transform:translateY(0)}
.lyr-h{padding:16px 20px 8px;display:flex;align-items:center;justify-content:space-between}
.lyr-h h3{font-size:16px;font-weight:700}
.lyr-x{background:none;border:none;font-size:20px;cursor:pointer;color:var(--t3);padding:2px 6px}
.lyr-x:hover{color:var(--t1)}
.lyr-b{flex:1;overflow-y:auto;padding:8px 20px 24px}
.lyr-line{padding:8px 0;font-size:15px;color:var(--t3);text-align:center;
  line-height:1.6;transition:all .3s}
.lyr-line.on{color:var(--t1);font-size:17px;font-weight:600}

/* ===== LOADING / EMPTY ===== */
.ld{text-align:center;padding:60px 20px;color:var(--t2);font-size:14px}
.ld::before{content:'';display:inline-block;width:16px;height:16px;
  border:2px solid var(--t3);border-top-color:var(--red);border-radius:50%;
  animation:sp .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--t3);font-size:14px}

/* ===== BACK BUTTON ===== */
.back{background:none;border:none;color:var(--red);font-size:14px;cursor:pointer;
  padding:4px 0;font-weight:500;margin-bottom:12px}

/* ===== TOAST ===== */
.toast{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-16px);
  background:rgba(44,44,46,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-radius:12px;padding:10px 20px;z-index:500;font-size:13px;font-weight:600;
  color:var(--t1);opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 20px rgba(0,0,0,.4);pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== HOT TAGS ===== */
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.tag{padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;
  background:rgba(255,255,255,.06);color:var(--t2);border:1px solid var(--sep);
  transition:.15s}
.tag:hover{color:var(--t1);border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.1)}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.section{animation:fadeUp .4s ease both}
.section:nth-child(2){animation-delay:.05s}
.section:nth-child(3){animation-delay:.1s}
.section:nth-child(4){animation-delay:.15s}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:0;height:0}
</style>

<script>
const API=location.origin,aud=document.getElementById('aud');
let tab='recommend',list=[],idx=-1,lyrics=[],lyrOk=false,loggedIn=false,
  qrTimer=null,dfid='',loop=0,lastHl=-1,qual='320',prevVol=80,sTimer=null,sAbort=null;

const TABS=[
  {id:'recommend',l:'йҰ–йЎө',ic:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>'},
  {id:'browse',l:'жөҸи§Ҳ',ic:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>'},
  {id:'rank',l:'жҺ’иЎҢ',ic:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>'},
  {id:'fm',l:'FM',ic:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49m-8.48-.01a6 6 0 0 1 0-8.49m11.31-2.82a10 10 0 0 1 0 14.14m-14.14 0a10 10 0 0 1 0-14.14"/></svg>'},
  {id:'library',l:'иө„ж–ҷеә“',ic:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>'},
];

// ===== API =====
function ah(e){const h={...e},p=[];const t=gt(),u=gu();if(t&&u)p.push('token='+t,'userid='+u);if(dfid)p.push('dfid='+dfid);if(p.length)h['Cookie']=p.join('; ');return h}
async function ap(p){try{const r=await fetch(API+p,{headers:ah()});const d=await r.json();return d.data||d}catch(e){return null}}
async function apP(p,b){try{const r=await fetch(API+p,{method:'POST',headers:ah({'Content-Type':'application/x-www-form-urlencoded'}),body:b});return await r.json()}catch(e){return null}}

// ===== Init =====
function init(){
  buildBnav();chkLogin();regDev();go('recommend');
}
async function regDev(){dfid=localStorage.getItem('kg_dfid')||'';try{const r=await fetch(API+'/register/dev',{method:'POST',headers:ah()});const d=await r.json();const f=d?.data?.dfid||d?.dfid;if(f){dfid=f;localStorage.setItem('kg_dfid',f)}}catch(e){}}

function buildBnav(){
  document.getElementById('bnav').innerHTML=TABS.map(t=>
    '<div class="bnav-i'+(t.id===tab?' active':'')+'" data-t="'+t.id+'" onclick="go(\''+t.id+'\')">'+t.ic+'<span>'+t.l+'</span></div>'
  ).join('');
}
function go(t){
  tab=t;
  const titles={recommend:'йҰ–йЎө',browse:'жөҸи§Ҳ',rank:'жҺ’иЎҢ',fm:'з§ҒдәәFM',library:'иө„ж–ҷеә“'};
  document.getElementById('topTitle').textContent=titles[t]||'';
  document.querySelectorAll('.sidebar-item,.bnav-i').forEach(e=>e.classList.toggle('active',e.dataset.t===t));
  loadTab(t);
}
async function loadTab(t){
  const p=document.getElementById('page');
  p.innerHTML='<div class="ld">еҠ иҪҪдёӯ</div>';
  switch(t){
    case 'recommend':await loadRec(p);break;
    case 'browse':await loadBrowse(p);break;
    case 'rank':await loadRank(p);break;
    case 'fm':await loadFM(p);break;
    case 'library':await loadLib(p);break;
    default:p.innerHTML='<div class="empty">йЎөйқўдёҚеӯҳеңЁ</div>';
  }
  document.getElementById('mainScroll').scrollTop=0;
}

// ===== Recommend =====
async function loadRec(p){
  const [s,h,b]=await Promise.all([ap('/recommend/songs'),ap('/search/hot'),ap('/yueku/banner')]);
  let html='';

  // Hero cards
  html+='<div class="hero-row">'+
    '<div class="hero-card" style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)" onclick="loadDaily()"><div class="hc-title">жҜҸж—ҘжҺЁиҚҗ</div><div class="hc-sub">ж №жҚ®дҪ зҡ„еҸЈе‘із”ҹжҲҗ</div></div>'+
    '<div class="hero-card" style="background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%)" onclick="go(\'fm\')"><div class="hc-title">з§ҒдәәFM</div><div class="hc-sub">жҮӮдҪ зҡ„йҹід№җз”өеҸ°</div></div>'+
    '<div class="hero-card" style="background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%)" onclick="go(\'rank\')"><div class="hc-title">жҺ’иЎҢжҰң</div><div class="hc-sub">зғӯй—Ёйҹід№җйЈҺеҗ‘ж Ү</div></div>'+
    '<div class="hero-card" style="background:linear-gradient(135deg,#a18cd1 0%,#fbc2eb 100%)" onclick="go(\'browse\')"><div class="hc-title">зІҫйҖүжӯҢеҚ•</div><div class="hc-sub">еҸ‘зҺ°жӣҙеӨҡзІҫеҪ©</div></div></div>';

  // Hot search
  if(h?.list?.[0]){
    html+='<div class="section"><div class="section-head"><div class="section-title">зғӯжҗң</div></div><div class="tags">'+
      h.list[0].keywords.slice(0,8).map(k=>'<div class="tag" onclick="searchKW(\''+esc(k.keyword)+'\')">'+esc(k.keyword)+'</div>').join('')+'</div></div>';
  }

  // Songs
  const songs=(s?.song_list||[]).map(ps);
  if(songs.length){list=songs;
    html+='<div class="section"><div class="section-head"><div class="section-title">жҺЁиҚҗжӯҢжӣІ</div></div>'+rsl(songs)+'</div>';
  }
  p.innerHTML=html;
}
async function loadDaily(){
  const p=document.getElementById('page');p.innerHTML='<div class="ld">еҠ иҪҪдёӯ</div>';
  const d=await ap('/recommend/songs');const songs=(d?.song_list||[]).map(ps);list=songs;
  p.innerHTML='<div class="page-head"><div class="page-title">жҜҸж—ҘжҺЁиҚҗ</div></div><button class="back" onclick="go(\'recommend\')">вҶҗ иҝ”еӣһ</button>'+rsl(songs);
}

// ===== Browse =====
async function loadBrowse(p){
  const d=await ap('/top/playlist?category_id=0&pagesize=20');
  if(!d){p.innerHTML='<div class="empty">еҠ иҪҪеӨұиҙҘ</div>';return}
  const ls=d.special_list||[];
  p.innerHTML='<div class="page-head"><div class="page-title">жөҸи§Ҳ</div></div><div class="section"><div class="section-head"><div class="section-title">зғӯй—ЁжӯҢеҚ•</div></div><div class="hrow">'+
    ls.map(s=>{const cv=(s.imgurl||s.flexible_cover||'').replace('{size}','400');
      return '<div class="card" onclick="loadPD(\''+(s.global_collection_id||s.specialid)+'\',\''+esc(s.specialname||s.listname)+'\')">'+
        '<div class="card-art">'+(cv?'<img src="'+cv+'" loading="lazy" onerror="this.outerHTML=\'<div class=card-art-ph>вҷӘ</div>\'">':'<div class="card-art-ph">вҷӘ</div>')+
        '<div class="card-play"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="8,5 19,12 8,19"/></svg></div></div>'+
        '<div class="card-title">'+esc(s.specialname||s.listname)+'</div><div class="card-sub">'+(s.songcount||0)+'йҰ–</div></div>';
    }).join('')+'</div></div>';
}
async function loadPD(id,name){
  const p=document.getElementById('page');p.innerHTML='<div class="ld">еҠ иҪҪдёӯ</div>';
  const d=await ap('/playlist/track/all?id='+encodeURIComponent(id)+'&page=1&pagesize=100');
  let songs=[];if(d)songs=(d.songs||d.info||[]).map(ps);list=songs;
  p.innerHTML='<div class="page-head"><div class="page-title">'+esc(name)+'</div></div><button class="back" onclick="go(\'browse\')">вҶҗ иҝ”еӣһ</button>'+rsl(songs);
}

// ===== Rank =====
async function loadRank(p){
  const d=await ap('/rank/list');
  if(!d?.info){p.innerHTML='<div class="empty">еҠ иҪҪеӨұиҙҘ</div>';return}
  const rs=d.info.map(r=>({id:r.rankid,name:r.rankname,
    img:(r.album_img_9||r.img_9||r.banner_9||'').replace('{size}','400')}));
  p.innerHTML='<div class="page-head"><div class="page-title">жҺ’иЎҢ</div></div><div class="section"><div class="section-head"><div class="section-title">жҺ’иЎҢжҰң</div></div><div class="hrow">'+
    rs.map(r=>'<div class="card" onclick="loadRD(\''+r.id+'\',\''+esc(r.name)+'\')">'+
      '<div class="card-art">'+(r.img?'<img src="'+r.img+'" loading="lazy" onerror="this.outerHTML=\'<div class=card-art-ph>вҷӘ</div>\'">':'<div class="card-art-ph">вҷӘ</div>')+
      '<div class="card-play"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="8,5 19,12 8,19"/></svg></div></div>'+
      '<div class="card-title">'+esc(r.name)+'</div></div>').join('')+'</div></div>';
}
async function loadRD(id,name){
  const p=document.getElementById('page');p.innerHTML='<div class="ld">еҠ иҪҪдёӯ</div>';
  let songs=[];
  const d=await ap('/rank/audio?rankid='+id+'&page=1&pagesize=50');
  const sl=d?.songlist||[];
  if(sl.length)songs=sl.map(s=>{
    const h=s.mvdata?.[0]?.hash||s.audio_info?.hash_320||s.audio_info?.hash_128||'';
    const cv=(s.trans_param?.union_cover||s.album_info?.sizable_cover||'').replace('{size}','200');
    return{name:s.songname||'',artist:s.author_name||'',hash:h,albumId:s.album_id||'',
      albumName:s.album_info?.album_name||'',dur:Math.round((s.audio_info?.duration_320||0)/1000),cover:cv};
  }).filter(s=>s.hash);
  list=songs;
  p.innerHTML='<div class="page-head"><div class="page-title">'+esc(name)+'</div></div><button class="back" onclick="go(\'rank\')">вҶҗ иҝ”еӣһ</button>'+(songs.length?rsl(songs):'<div class="empty">жҡӮж— ж•°жҚ®</div>');
}

// ===== FM =====
async function loadFM(p){
  let songs=[];const d=await ap('/personal/fm');
  if(d?.songs)songs=d.songs.map(ps);
  if(!songs.length){const r=await ap('/recommend/songs');if(r?.song_list)songs=r.song_list.map(ps);}
  list=songs;
  p.innerHTML='<div class="page-head"><div class="page-title">з§ҒдәәFM</div></div><div class="section"><div class="section-head"><div class="section-title">жӯЈеңЁж’ӯж”ҫ</div><button class="section-more" onclick="go(\'fm\')">жҚўдёҖжү№</button></div>'+
    (songs.length?rsl(songs):'<div class="empty">жҡӮж— жӯҢжӣІ</div>')+'</div>';
}

// ===== Library =====
async function loadLib(p){
  if(!loggedIn){
    p.innerHTML='<div class="page-head"><div class="page-title">иө„ж–ҷеә“</div></div><div class="empty" style="padding:60px 20px"><div style="font-size:48px;margin-bottom:12px">вҷ«</div><div style="font-size:16px;font-weight:600;margin-bottom:6px">зҷ»еҪ• Sher</div><div style="font-size:13px;color:var(--t2);margin-bottom:16px">еҗҢжӯҘдҪ зҡ„жӯҢеҚ•е’Ңж”¶и—Ҹ</div><button class="btn-go" style="width:160px;margin:0 auto;display:block" onclick="openLogin()">з«ӢеҚізҷ»еҪ•</button></div>';
    return;
  }
  p.innerHTML='<div class="ld">еҠ иҪҪдёӯ</div>';let html='<div class="page-head"><div class="page-title">иө„ж–ҷеә“</div></div>';
  const dt=await ap('/user/detail');
  if(dt)html+='<div class="section" style="display:flex;align-items:center;gap:12px"><div class="sidebar-avatar" style="width:44px;height:44px;font-size:18px">'+(dt.nick_name||'U')[0]+'</div><div><div style="font-size:16px;font-weight:700">'+esc(dt.nick_name||'з”ЁжҲ·')+'</div><div style="font-size:12px;color:var(--t2)">'+(dt.fans_count||0)+' зІүдёқ</div></div></div>';
  const pl=await ap('/user/playlist?userid='+gu());
  if(pl){const ls=pl.info||pl.list||pl.special_list||[];
    if(ls.length)html+='<div class="section"><div class="section-head"><div class="section-title">жӯҢеҚ•</div></div><div class="hrow">'+ls.map(s=>{
      const cv=(s.imgurl||s.flexible_cover||'').replace('{size}','400');
      return'<div class="card" onclick="loadPD(\''+(s.global_collection_id||s.specialid)+'\',\''+esc(s.specialname||s.listname||'')+'\')"><div class="card-art">'+(cv?'<img src="'+cv+'" loading="lazy">':'<div class="card-art-ph">вҷӘ</div>')+'<div class="card-play"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="8,5 19,12 8,19"/></svg></div></div><div class="card-title">'+esc(s.specialname||s.listname||'')+'</div><div class="card-sub">'+(s.songcount||0)+'йҰ–</div></div>';
    }).join('')+'</div></div>';}
  const hi=await ap('/user/history');
  if(hi){const raw=hi.songs||hi.info||hi.list||[];const songs=raw.map(i=>ps(i.info||i));
    if(songs.length)html+='<div class="section"><div class="section-head"><div class="section-title">жңҖиҝ‘ж’ӯж”ҫ</div></div>'+rsl(songs.slice(0,15))+'</div>';}
  html+='<div style="text-align:center;padding:16px"><button class="section-more" onclick="logout()">йҖҖеҮәзҷ»еҪ•</button></div>';
  p.innerHTML=html;
}

// ===== Search =====
function debSearch(){clearTimeout(sTimer);const q=document.getElementById('searchInput').value.trim();if(q.length<1)return;sTimer=setTimeout(doSearch,120)}
function debSearch2(){clearTimeout(sTimer);const q=document.getElementById('searchInput2').value.trim();if(q.length<1)return;sTimer=setTimeout(doSearch2,120)}
function doSearch(){
  const q=document.getElementById('searchInput').value.trim();if(!q)return;
  execSearch(q);
}
function doSearch2(){
  const q=document.getElementById('searchInput2').value.trim();if(!q)return;
  document.getElementById('searchInput').value=q;
  execSearch(q);
}
function execSearch(q){
  clearTimeout(sTimer);if(sAbort)sAbort.abort();sAbort=new AbortController();
  const p=document.getElementById('page');p.innerHTML='<div class="ld">жҗңзҙўдёӯ</div>';
  fetch(API+'/search/complex?keywords='+encodeURIComponent(q)+'&page=1&pagesize=20',{headers:ah(),signal:sAbort.signal})
  .then(r=>r.json()).then(d=>{
    const dd=d?.data||d;let songs=[];
    if(dd?.lists){const sg=dd.lists.find(l=>l.type==='song');if(sg?.lists)songs=sg.lists.map(ps);}
    if(!songs.length&&dd?.song_list)songs=dd.song_list.map(ps);
    list=songs;
    p.innerHTML='<div class="page-head"><div class="page-title">жҗңзҙў</div></div><button class="back" onclick="go(\'recommend\')">вҶҗ иҝ”еӣһ</button><div class="section"><div class="section-head"><div class="section-title">'+esc(q)+'</div></div>'+(songs.length?rsl(songs.slice(0,20)):'<div class="empty">жңӘжүҫеҲ°з»“жһң</div>')+'</div>';
  }).catch(e=>{if(e.name!=='AbortError')p.innerHTML='<div class="empty">жҗңзҙўеӨұиҙҘ</div>'});
}
function searchKW(k){document.getElementById('searchInput').value=k;execSearch(k)}

// ===== Song Parsing =====
function ps(s){
  let n=s.songname||s.audio_name||s.filename||s.name||s.FileName||'';
  let a=s.singername||s.author_name||s.SingerName||s.author||'';
  if(!a&&n.includes(' - ')){const p=n.split(' - ');a=p[0].trim();n=p.slice(1).join(' - ').trim();}
  const c=(s.sizable_cover||s.trans_param?.union_cover||s.cover||s.album_cover||'').replace('{size}','200');
  return{name:n,artist:a,hash:s.hash||s.FileHash||'',albumId:s.album_id||s.AlbumID||'',
    albumName:s.albumname||s.AlbumName||'',dur:s.timelength?Math.round(s.timelength/1000):(s.duration||0),cover:c};
}
function rsl(songs){
  return '<div class="song-list">'+songs.map((s,i)=>
    '<div class="song-row'+(idx===i?' playing':'')+'" onclick="play('+i+')" id="sr-'+i+'">'+
    '<div class="song-r-num">'+(i+1)+'</div>'+
    '<div class="song-r-art">'+(s.cover?'<img src="'+s.cover+'" loading="lazy" onerror="this.parentNode.textContent=\'вҷӘ\'">':'вҷӘ')+'</div>'+
    '<div class="song-r-info"><div class="song-r-name">'+esc(s.name)+'</div><div class="song-r-artist">'+esc(s.artist)+'</div></div>'+
    '<div class="song-r-dur">'+ft(s.dur)+'</div></div>'
  ).join('')+'</div>';
}

// ===== Player =====
async function play(i){
  if(i<0||i>=list.length)return;idx=i;const s=list[i];
  const bar=document.getElementById('player');bar.classList.add('show');
  document.getElementById('pTitle').textContent=s.name;
  document.getElementById('pArt').textContent=s.artist;
  document.getElementById('pCov').innerHTML=s.cover?'<img src="'+s.cover+'">':'<div class="card-art-ph" style="font-size:20px;border-radius:8px">вҷӘ</div>';
  setPI(true);hl(i);
  if(!s.hash){document.getElementById('pTitle').textContent+=' (ж— hash)';return}
  try{
    const d=await ap('/song/url?hash='+s.hash+'&album_id='+(s.albumId||'')+'&quality='+qual+'&free_part=1');
    const u=d?.url?.[0]||d?.backupUrl?.[0]||d?.url||'';
    if(u){aud.src=u;aud.play().catch(()=>{});lyrOk=false;loadLyr(s)}
    else document.getElementById('pTitle').textContent+=' (ж— жі•ж’ӯж”ҫ)';
  }catch(e){document.getElementById('pTitle').textContent+=' (иҺ·еҸ–еӨұиҙҘ)';}
}
function togPlay(){if(aud.paused){aud.play();setPI(true)}else{aud.pause();setPI(false)}}
function setPI(p){
  document.getElementById('playIco').innerHTML=p?'<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>':'<polygon points="8,5 19,12 8,19"/>';
}
function togLoop(){
  loop=(loop+1)%3;const b=document.getElementById('loopBtn'),ic=document.getElementById('loopIco');
  b.title=['еҲ—иЎЁеҫӘзҺҜ','еҚ•жӣІеҫӘзҺҜ','йҡҸжңәж’ӯж”ҫ'][loop];
  if(loop===0)ic.innerHTML='<polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>';
  else if(loop===1)ic.innerHTML='<polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/><text x="12" y="15" text-anchor="middle" font-size="9" font-weight="700" fill="currentColor" stroke="none">1</text>';
  else ic.innerHTML='<polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/>';
}
function next(){if(!list.length)return;if(loop===2)play(Math.floor(Math.random()*list.length));else play((idx+1)%list.length)}
function prev(){if(list.length)play((idx-1+list.length)%list.length)}
function seekP(e){if(aud.duration)aud.currentTime=(e.offsetX/e.currentTarget.offsetWidth)*aud.duration}
function hl(i){if(lastHl>=0){const p=document.getElementById('sr-'+lastHl);if(p)p.classList.remove('playing')}lastHl=i;const e=document.getElementById('sr-'+i);if(e)e.classList.add('playing')}

aud.addEventListener('timeupdate',()=>{if(!aud.duration)return;document.getElementById('pFill').style.width=aud.currentTime/aud.duration*100+'%'});
aud.addEventListener('ended',()=>{if(loop===1){aud.currentTime=0;aud.play()}else next()});
aud.addEventListener('play',()=>setPI(true));
aud.addEventListener('pause',()=>setPI(false));

// ===== Lyrics =====
async function loadLyr(s){if(!s.hash)return;try{const r=await ap('/search/lyric?hash='+s.hash+'&page=1&pagesize=5');
  const c=r?.candidates||[];if(!c.length)return;const x=c[0];
  const d=await ap('/lyric?id='+encodeURIComponent(x.id)+'&accesskey='+encodeURIComponent(x.accesskey)+'&decode=true');
  const txt=d?.decodeContent||d?.content||'';if(txt){lyrics=parseLyr(txt);lyrOk=true}}catch(e){}}
function parseLyr(t){const ls=t.split('\n'),r=[];const lr=/^\[(\d{2}):(\d{2})\.(\d{2,3})\]/,kr=/^\[(\d+),\d+\]/;
  for(const l of ls){const m=l.match(lr);if(m){const t=parseInt(m[1])*60+parseInt(m[2])+parseInt(m[3])/(m[3].length===3?1000:100);const c=l.replace(lr,'').trim();if(c)r.push({t,c});continue}
  const k=l.match(kr);if(k){const t=parseInt(k[1])/1000;const c=l.replace(kr,'').replace(/<\d+,\d+,\d+>/g,'').trim();if(c)r.push({t,c})}}
  return r.sort((a,b)=>a.t-b.t)}
function openLyr(){document.getElementById('lyrBg').classList.add('on');document.getElementById('lyrP').classList.add('on');updLyr()}
function closeLyr(){document.getElementById('lyrBg').classList.remove('on');document.getElementById('lyrP').classList.remove('on')}
function updLyr(){const p=document.getElementById('lyrB');if(!lyrics.length){p.innerHTML='<div class="empty">жҡӮж— жӯҢиҜҚ</div>';return}
  let ai=-1;for(let i=lyrics.length-1;i>=0;i--){if(aud.currentTime>=lyrics[i].t){ai=i;break}}
  p.innerHTML=lyrics.map((l,i)=>'<div class="lyr-line'+(i===ai?' on':'')+'">'+esc(l.c)+'</div>').join('');
  const a=p.querySelector('.lyr-line.on');if(a)a.scrollIntoView({behavior:'smooth',block:'center'})}

// ===== Login =====
let ltab='phone';
function openLogin(){document.getElementById('mbg').classList.add('on');if(ltab==='qr')loadQR()}
function closeLogin(){document.getElementById('mbg').classList.remove('on');stopQR()}
function swLTab(t){ltab=t;document.querySelectorAll('.login-tab').forEach(e=>e.classList.toggle('on',e.textContent.includes(t==='phone'?'жүӢжңәеҸ·':'жү«з Ғ')));
  document.getElementById('lPhone').style.display=t==='phone'?'':'none';document.getElementById('lQr').style.display=t==='qr'?'':'none';if(t==='qr')loadQR();else stopQR()}
async function sendCode(){const ph=document.getElementById('phoneIn').value.trim();if(!/^1\d{10}$/.test(ph)){alert('иҜ·иҫ“е…ҘжӯЈзЎ®зҡ„жүӢжңәеҸ·');return}
  const b=document.getElementById('sendBtn');b.disabled=true;try{const d=await ap('/captcha/sent?mobile='+ph);
    if(d&&(d.status===1||d.code===200)){b.textContent='60s';let c=60;const t=setInterval(()=>{c--;b.textContent=c+'s';if(c<=0){clearInterval(t);b.textContent='еҸ‘йҖҒ';b.disabled=false}},1000)}
    else{alert(d?.error_msg||'еҸ‘йҖҒеӨұиҙҘ');b.disabled=false}}catch(e){alert('еҸ‘йҖҒеӨұиҙҘ');b.disabled=false}}
async function phoneLogin(){const ph=document.getElementById('phoneIn').value.trim(),co=document.getElementById('codeIn').value.trim();
  if(!/^1\d{10}$/.test(ph)){alert('иҜ·иҫ“е…ҘжӯЈзЎ®зҡ„жүӢжңәеҸ·');return}if(!co){alert('иҜ·иҫ“е…ҘйӘҢиҜҒз Ғ');return}
  const b=document.getElementById('loginBtn2');b.disabled=true;b.textContent='зҷ»еҪ•дёӯ...';
  try{const d=await apP('/login/cellphone','mobile='+encodeURIComponent(ph)+'&code='+encodeURIComponent(co));
    const dd=d?.data;if(dd?.token||d?.status===1){saveL(dd?.token||'',String(dd?.userid||''));closeLogin();onLogin()}
    else alert(d?.error_msg||'зҷ»еҪ•еӨұиҙҘ')}catch(e){alert('зҷ»еҪ•еӨұиҙҘ')}b.disabled=false;b.textContent='зҷ»еҪ•'}

// QR Login
let qrK='';
async function loadQR(){const b=document.getElementById('qrBox'),st=document.getElementById('qrSt');
  b.innerHTML='<span style="color:var(--t3);font-size:12px">еҠ иҪҪдёӯ...</span>';st.textContent='з”ҹжҲҗдәҢз»ҙз Ғ...';
  try{const k=await ap('/login/qr/key?type=web');const key=k?.qrcode||k?.key;
    if(!key){b.innerHTML='<span style="color:var(--t3);font-size:12px">иҺ·еҸ–еӨұиҙҘ</span>';return}qrK=key;
    const c=await ap('/login/qr/create?key='+qrK+'&qrimg=true&type=web');
    const img=c?.base64||k?.qrcode_img;
    if(img){b.innerHTML='<img src="'+img+'">';st.textContent='иҜ·дҪҝз”Ёй…·зӢ—йҹід№җAPPжү«з Ғ';startQR()}
    else b.innerHTML='<span style="color:var(--t3);font-size:12px">з”ҹжҲҗеӨұиҙҘ</span>'}catch(e){b.innerHTML='<span style="color:var(--t3);font-size:12px">еҠ иҪҪеӨұиҙҘ</span>'}}
function startQR(){stopQR();qrTimer=setInterval(chkQR,2000)}
function stopQR(){if(qrTimer){clearInterval(qrTimer);qrTimer=null}}
async function chkQR(){if(!qrK)return;try{const d=await ap('/login/qr/check?key='+qrK);if(!d)return;
  const s=d.status??1,st=document.getElementById('qrSt');
  if(s===0){st.textContent='е·ІиҝҮжңҹпјҢиҜ·еҲ·ж–°';stopQR()}else if(s===1)st.textContent='иҜ·дҪҝз”Ёй…·зӢ—йҹід№җAPPжү«з Ғ';
  else if(s===2){st.textContent='жү«з ҒжҲҗеҠҹпјҢиҜ·зЎ®и®Ө';st.style.color='#30d158'}
  else if(s===4){st.textContent='зҷ»еҪ•жҲҗеҠҹпјҒ';st.style.color='#30d158';stopQR();
    saveL(d.token||'',String(d.userid||''));toast('зҷ»еҪ•жҲҗеҠҹ');setTimeout(()=>{closeLogin();onLogin()},500)}}catch(e){}}

// Auth
function saveL(t,u){localStorage.setItem('kg_token',t);localStorage.setItem('kg_userid',u);loggedIn=true}
function gt(){return localStorage.getItem('kg_token')||''}
function gu(){return localStorage.getItem('kg_userid')||''}
function logout(){localStorage.removeItem('kg_token');localStorage.removeItem('kg_userid');loggedIn=false;updLogin();go('library')}
function chkLogin(){loggedIn=!!(gt()&&gu());updLogin()}
function updLogin(){
  const btn=document.getElementById('loginBtn');
  if(btn)btn.style.display=loggedIn?'none':'flex';
  const auth=document.getElementById('sidebarAuth');
  if(auth&&loggedIn){
    auth.innerHTML='<div class="sidebar-user" onclick="go(\'library\')"><div class="sidebar-avatar">'+(gt()[0]||'U').toUpperCase()+'</div><span class="sidebar-username">жҲ‘зҡ„иө„ж–ҷеә“</span></div>';
  }else if(auth){
    auth.innerHTML='<div class="sidebar-login" id="loginBtn" onclick="openLogin()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>зҷ»еҪ•</span></div>';
  }
}
function onLogin(){chkLogin();if(tab==='library')loadTab('library')}

// ===== Volume =====
aud.volume=.8;
function setVol(v){aud.volume=v/100;updVI(v);localStorage.setItem('kg_vol',v)}
function togMute(){const s=document.getElementById('volR');if(aud.volume>0){prevVol=s.value;setVol(0);s.value=0}else{setVol(prevVol||80);s.value=prevVol||80}}
function updVI(v){const i=document.getElementById('volIco');
  if(v==0)i.innerHTML='<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
  else if(v<50)i.innerHTML='<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>';
  else i.innerHTML='<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>';}
(function(){const v=localStorage.getItem('kg_vol');if(v!==null){aud.volume=v/100;document.getElementById('volR').value=v;updVI(v)}})();

// ===== Quality =====
function togQ(){document.getElementById('qDd').classList.toggle('show')}
function setQ(q){qual=q;localStorage.setItem('kg_quality',q);
  const b=document.getElementById('qBtn'),lb={128:'128',320:'320',flac:'FLAC'};
  b.textContent=lb[q]||q;b.classList.toggle('on',q!=='128');
  document.querySelectorAll('.qo').forEach(o=>o.classList.toggle('on',o.dataset.q===q));
  document.getElementById('qDd').classList.remove('show');if(idx>=0)play(idx)}
(function(){const q=localStorage.getItem('kg_quality');if(q)setQ(q)})();
document.addEventListener('click',e=>{if(!e.target.closest('.p-q'))document.getElementById('qDd').classList.remove('show')});

// ===== Utils =====
function ft(s){if(!s||s<0)return'0:00';return Math.floor(s/60)+':'+(Math.floor(s%60)<10?'0':'')+Math.floor(s%60)}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function toast(m){let t=document.querySelector('.toast');if(!t){t=document.createElement('div');t.className='toast';document.body.appendChild(t)}
  t.textContent=m;requestAnimationFrame(()=>t.classList.add('on'));setTimeout(()=>t.classList.remove('on'),2500)}

init();
</script>
